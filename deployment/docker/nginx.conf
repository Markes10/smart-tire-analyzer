# ── Smart Tire Analyzer — Nginx Production Configuration ──────────────────
# Security-hardened reverse proxy with TLS termination, CSP, HSTS, rate limiting.
#
# TLS certificate setup:
#   Development (self-signed):
#     bash scripts/generate_dev_certs.sh
#     # OR let docker-compose auto-generate via the cert-gen service
#     # Certificates stored in ./certs/ directory
#
#   Production (Let's Encrypt):
#     bash scripts/setup_production_certs.sh your-domain.com
#     # Certificates stored in /etc/letsencrypt/live/your-domain.com/
#     # Set DOMAIN=your-domain.com and ENABLE_HTTPS=true in .env
#
# IMPORTANT:
#   - In development, ./certs/ is bind-mounted to /etc/nginx/ssl/
#   - In production, mount your Let's Encrypt directory:
#       volumes:
#         - /etc/letsencrypt:/etc/letsencrypt:ro
#     Then update ssl_certificate paths below to point to your real certs.
#   - Update server_name directives to match your domain.
#
# For certbot users: after running 'certbot --nginx', certbot will
# automatically modify this file with the correct certificate paths.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging (no sensitive data) ────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 15m;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 256;

    # ── Rate limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 10;

    # ── Upstream backend ───────────────────────────────────────────────────
    upstream smart_tire_backend {
        server backend:8000;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════════════
    # HTTPS Server (TLS termination) — enabled when certs exist in /etc/nginx/ssl/
    # ═══════════════════════════════════════════════════════════════════════
    # Development: self-signed certs from ./certs/ are mounted at /etc/nginx/ssl/
    # Production:  update paths to point to Let's Encrypt certs, e.g.:
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;
    server {
        listen 443 ssl http2;
        # ⚠️  Update this to your domain in production
        server_name localhost;

        # ── TLS certificates ──────────────────────────────────────────────
        # Dev (auto-generated):     /etc/nginx/ssl/server.crt
        # Production (Let's Encrypt): /etc/letsencrypt/live/<domain>/fullchain.pem
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_trusted_certificate /etc/nginx/ssl/ca.crt;

        # ── Modern TLS configuration ──────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── OCSP Stapling ─────────────────────────────────────────────────
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ── Security Headers ──────────────────────────────────────────────
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "0" always;  # Deprecated; rely on CSP
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self), payment=()" always;

        # Content Security Policy (adjust as needed for your domain)
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com;
            style-src 'self' 'unsafe-inline';
            img-src 'self' data: blob: https:;
            font-src 'self' data:;
            connect-src 'self' https://maps.googleapis.com https://api.openweathermap.org https://generativelanguage.googleapis.com https://graph.mapillary.com;
            frame-src 'self' https://www.google.com;
            object-src 'none';
            base-uri 'self';
            form-action 'self';
            frame-ancestors 'none';
        " always;

        # HTTP Strict Transport Security (1 year, include subdomains)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Health check ──────────────────────────────────────────────────
        location /health {
            proxy_pass http://smart_tire_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API endpoints ─────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://smart_tire_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static assets ─────────────────────────────────────────────────
        location /static/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # HTTP Server — proxies to backend (no TLS)
    # ═══════════════════════════════════════════════════════════════════════
    # In production, this block should redirect HTTP → HTTPS.
    # Uncomment the return 301 line below AFTER setting up TLS certificates.
    #
    # For certbot users, run: certbot --nginx -d your-domain.com
    # Certbot will automatically modify this file.
    server {
        listen 80;
        server_name localhost;

        # Health check
        location /health {
            proxy_pass http://smart_tire_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ACME challenge for Let's Encrypt (must not redirect)
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # ── PRODUCTION: Uncomment this to redirect HTTP → HTTPS ───────────
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # ── DEVELOPMENT: Proxy without TLS ────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://smart_tire_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # Default server block — deny all unknown hosts
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        return 444;  # Close connection without response
    }
}
