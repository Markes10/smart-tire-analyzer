# Kubernetes Deployment — Smart Tire Analyzer Backend
# Production-grade deployment with rolling updates and probes.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-tire-backend
  namespace: smart-tire
  labels:
    app: smart-tire-backend
    version: "1.0.0"
spec:
  replicas: 1                      # Start with 1 replica (PVC uses ReadWriteOnce)
  selector:
    matchLabels:
      app: smart-tire-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0            # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: smart-tire-backend
        version: "1.0.0"
    spec:
      containers:
        - name: backend
          image: smart-tire-analyzer-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: GEMINI_API_KEYS
              value: ""
            - name: GOOGLE_MAPS_API_KEYS
              value: ""
            - name: OPENWEATHER_API_KEYS
              value: ""
            - name: MAPILLARY_API_KEYS
              value: ""
            - name: DATABASE_URL
              value: "sqlite+aiosqlite:///./data/smart_tire.db"
            - name: BACKEND_CORS_ORIGINS
              value: "http://localhost:3000,http://localhost:8081"
            - name: AUTH_ENABLED
              value: "false"
            - name: AUTO_RETRAIN
              value: "false"
          volumeMounts:
            - name: model-storage
              mountPath: /app/ai_model/saved_models
              readOnly: true
            - name: data-storage
              mountPath: /app/data
          command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: smart-tire-model-pvc
        - name: data-storage
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
