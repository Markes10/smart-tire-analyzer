# Kubernetes Deployment — Smart Tire Analyzer Frontend
apiVersion: v1
kind: Secret
metadata:
  name: smart-tire-frontend-secrets
  namespace: smart-tire
  labels:
    app: smart-tire-frontend
type: Opaque
stringData:
  # ⚠️  Replace in production:
  #   kubectl create secret generic smart-tire-frontend-secrets \
  #     --namespace smart-tire \
  #     --from-literal=NEXTAUTH_SECRET="$(python -c 'import secrets; print(secrets.token_urlsafe(32))')"
  NEXTAUTH_SECRET: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-tire-frontend
  namespace: smart-tire
  labels:
    app: smart-tire-frontend
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-tire-frontend
  template:
    metadata:
      labels:
        app: smart-tire-frontend
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: smart-tire-analyzer-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://smart-tire-backend-svc:8000"
            - name: NEXTAUTH_URL
              value: "https://YOUR_DOMAIN.com"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-tire-frontend-secrets
                  key: NEXTAUTH_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: smart-tire-frontend-svc
  namespace: smart-tire
  labels:
    app: smart-tire-frontend
spec:
  type: LoadBalancer
  selector:
    app: smart-tire-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
